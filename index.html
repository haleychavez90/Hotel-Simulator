<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hotel Simulator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="styles.css" rel="stylesheet">
</head>
<body>
  <h1>Hotel Simulator</h1>

  <form id="checkInForm">
    <label for="guestName">Guest Name:</label>
    <input type="text" id="guestName" required>

    <label for="roomNumber">Room Number:</label>
    <input type="number" id="roomNumber" min="1" required>

    <label for="stayDuration">Stay Duration:</label>
    <input type="number" id="stayDuration" min="1" required>

    <button type="submit">Check In</button>
    <div class="error" id="errorMsg"></div>
  </form>

  <h2>Guest List</h2>
  <div id="guestList" class="guest-list"></div>

  <script src="main.js"></script>
</body>
</html>
