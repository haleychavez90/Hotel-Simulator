<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Simulator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Hotel Check-In Simulator</h1>

  <!-- Check-In -->
<form id="checkInForm">
    <label for="guestName">Guest Name:</label>
    <input type="text" id="guestName" name="guestName" required>

    <label for="roomNumber">Room Number:</label>
    <input type="number" id="roomNumber" name="roomNumber" required>

    <label for="stayDuration">Stay Duration (nights):</label>
    <input type="number" id="stayDuration" name="stayDuration" required>

    <button type="submit">Check In</button>
    <p id="errorMessage" class="error"></p>
</form>
    <h2>Guest List</h2>
<div id="guestList" class="guest-list"></div>

    <script src="script.js"></script>
    <script src="main.js"></script>

</body>
</html>
